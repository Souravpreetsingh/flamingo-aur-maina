<script>
function togglePassword() {
    const p = document.getElementById('password');
    const i = document.getElementById('toggleIcon');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.innerText = p.type === 'password' ? 'visibility' : 'visibility_off';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearFieldErrors('loginForm');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    let valid = true;
    if (!email) { showFieldError('email', 'Email is required'); valid = false; }
    else if (!isValidEmail(email)) { showFieldError('email', 'Enter a valid email address'); valid = false; }
    if (!password) { showFieldError('password', 'Password is required'); valid = false; }
    if (!valid) return;

    setLoading('loginBtn', true, 'Signing in...');

    try {
        await AuthAPI.login(email, password);
        showToast('Welcome back! Redirecting to dashboard...', 'success');
        setTimeout(() => { window.location.href = '../dashboard/index.html'; }, 800);
    } catch (err) {
        const msg = err.detail || err.message || 'Invalid email or password';
        showToast(msg, 'error');
        setLoading('loginBtn', false);
    }
});
</script>
