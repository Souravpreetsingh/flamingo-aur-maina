</main>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var roomId = params.get('id') || 1;
    var room = getRoomById(roomId);
    if (!room) { room = getRoomById(1); roomId = 1; }

    function formatINR(n) {
        var s = Math.round(n).toString();
        var last3 = s.slice(-3);
        var rest = s.slice(0, -3);
        return (rest ? rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + ',' : '') + last3;
    }

    function renderRoom(r) {
        var main = document.getElementById('room-details-main');
        var pricePerNight = r.price;
        var nights = 5;
        var totalNights = pricePerNight * nights;
        var cleaningFee = Math.round(pricePerNight * 0.35);
        var serviceFee = Math.round(pricePerNight * 1.9);
        var grandTotal = totalNights + cleaningFee + serviceFee;
        var images = getRoomImages(r);

        main.innerHTML = [
            '<div class="mb-8">',
                '<div class="flex items-center gap-2 text-label-md font-label-md text-on-surface-variant mb-4">',
                    '<a class="hover:text-primary transition-colors" href="../rooms/index.html">Rooms</a>',
                    '<span class="material-symbols-outlined text-[16px]">chevron_right</span>',
                    '<span class="text-primary">' + r.name + '</span>',
                '</div>',
                '<div class="flex flex-col md:flex-row md:items-end justify-between gap-6">',
                    '<div>',
                        '<h1 class="text-display-lg-mobile md:text-display-lg font-display-lg-mobile md:font-display-lg text-primary mb-2">' + r.name + '</h1>',
                        '<div class="flex items-center gap-4 text-body-md font-body-md text-on-surface-variant">',
                            '<div class="flex items-center gap-1 text-secondary">',
                                '<span class="material-symbols-outlined text-[20px]" data-weight="fill">star</span>',
                                '<span class="font-medium text-primary">' + r.rating + '</span>',
                                '<span class="text-on-surface-variant">(' + r.reviews + ' reviews)</span>',
                            '</div>',
                            '<span class="w-1 h-1 rounded-full bg-outline-variant"></span>',
                            '<div class="flex items-center gap-1">',
                                '<span class="material-symbols-outlined text-[20px]">location_on</span>',
                                '<span>' + r.location + '</span>',
                            '</div>',
                        '</div>',
                    '</div>',
                '</div>',
            '</div>',
            '<div class="grid grid-cols-1 md:grid-cols-4 md:grid-rows-2 gap-4 h-[300px] md:h-[614px] mb-8 md:mb-16 rounded-2xl overflow-hidden" id="gallery-grid">',
                '<div class="md:col-span-2 md:row-span-2 relative group overflow-hidden">',
                    '<div class="bg-cover bg-center w-full h-full absolute inset-0 transition-transform duration-700 group-hover:scale-105 gallery-img" data-room-id="' + r.id + '" data-index="0" style="background-image: url(\'' + images[0] + '\')"></div>',
                '</div>',
                '<div class="hidden md:block relative group overflow-hidden">',
                    '<div class="bg-cover bg-center w-full h-full absolute inset-0 transition-transform duration-700 group-hover:scale-105 gallery-img" data-room-id="' + r.id + '" data-index="1" style="background-image: url(\'' + images[1] + '\')"></div>',
                '</div>',
                '<div class="hidden md:block relative group overflow-hidden">',
                    '<div class="bg-cover bg-center w-full h-full absolute inset-0 transition-transform duration-700 group-hover:scale-105 gallery-img" data-room-id="' + r.id + '" data-index="2" style="background-image: url(\'' + images[2] + '\')"></div>',
                '</div>',
                '<div class="hidden md:block md:col-span-2 relative group overflow-hidden">',
                    '<div class="bg-cover bg-center w-full h-full absolute inset-0 transition-transform duration-700 group-hover:scale-105 gallery-img" data-room-id="' + r.id + '" data-index="3" style="background-image: url(\'' + images[3] + '\')"></div>',
                '</div>',
            '</div>',
            '<div class="flex flex-col lg:flex-row gap-16">',
                '<div class="w-full lg:w-2/3">',
                    '<section class="mb-16">',
                        '<h2 class="text-headline-md font-headline-md text-primary mb-6">About this space</h2>',
                        '<p class="text-body-lg font-body-lg text-on-surface-variant leading-relaxed mb-6">' + (r.longDescription[0] || r.description) + '</p>',
                        '<p class="text-body-lg font-body-lg text-on-surface-variant leading-relaxed">' + (r.longDescription[1] || '') + '</p>',
                    '</section>',
                    '<hr class="border-outline-variant/20 mb-16"/>',
                    '<section class="mb-16">',
                        '<h2 class="text-headline-md font-headline-md text-primary mb-8">Premium Amenities</h2>',
                        '<div class="grid grid-cols-2 md:grid-cols-3 gap-y-8 gap-x-4" id="amenities-grid">',
                            r.amenities.map(function(a) {
                                return '<div class="flex items-center gap-3"><span class="material-symbols-outlined text-on-surface-variant text-[28px] font-light">' + a.icon + '</span><span class="text-body-md font-body-md text-primary">' + a.text + '</span></div>';
                            }).join(''),
                        '</div>',
                    '</section>',
                '</div>',
                '<div class="w-full lg:w-1/3 relative">',
                    '<div class="sticky top-32 glass-panel rounded-2xl p-8 soft-shadow">',
                        '<div class="flex justify-between items-end mb-8">',
                            '<div><span class="text-headline-md font-headline-md text-primary" id="price-display">₹' + formatINR(pricePerNight) + '</span><span class="text-body-md font-body-md text-on-surface-variant">/ night</span><div class="text-label-md font-label-md text-on-surface-variant mt-1">Including GST</div></div>',
                        '</div>',
                        '<div class="border border-outline-variant/30 rounded-xl mb-6 overflow-hidden bg-surface-container-lowest">',
                            '<div class="flex border-b border-outline-variant/30">',
                                '<div class="w-1/2 p-3 border-r border-outline-variant/30 hover:bg-surface-container-low transition-colors cursor-pointer">',
                                    '<label class="block text-label-md font-label-md text-on-surface-variant mb-1 uppercase text-[10px]">Check-in</label>',
                                    '<div class="text-body-md font-body-md text-primary">Select date</div>',
                                '</div>',
                                '<div class="w-1/2 p-3 hover:bg-surface-container-low transition-colors cursor-pointer">',
                                    '<label class="block text-label-md font-label-md text-on-surface-variant mb-1 uppercase text-[10px]">Check-out</label>',
                                    '<div class="text-body-md font-body-md text-primary">Select date</div>',
                                '</div>',
                            '</div>',
                            '<div class="p-3 hover:bg-surface-container-low transition-colors cursor-pointer flex justify-between items-center">',
                                '<div><label class="block text-label-md font-label-md text-on-surface-variant mb-1 uppercase text-[10px]">Guests</label><div class="text-body-md font-body-md text-primary">' + r.capacity + ' Guests</div></div>',
                                '<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>',
                            '</div>',
                        '</div>',
                        '<button class="w-full bg-primary text-on-primary py-4 rounded-full text-label-md font-label-md hover:scale-[1.02] hover:shadow-lg transition-smooth mb-6" onclick="window.location.href=\'../booking/index.html?id=' + r.id + '\'">Reserve Now</button>',
                        '<div class="text-center text-label-md font-label-md text-on-surface-variant mb-6">You won\'t be charged yet</div>',
                        '<div class="space-y-4 text-body-md font-body-md text-on-surface-variant">',
                            '<div class="flex justify-between"><span class="underline decoration-outline-variant/50 underline-offset-4">' + nights + ' nights</span><span>₹' + formatINR(totalNights) + '</span></div>',
                            '<div class="flex justify-between"><span class="underline decoration-outline-variant/50 underline-offset-4">Cleaning fee</span><span>₹' + formatINR(cleaningFee) + '</span></div>',
                            '<div class="flex justify-between"><span class="underline decoration-outline-variant/50 underline-offset-4">Service fee</span><span>₹' + formatINR(serviceFee) + '</span></div>',
                        '</div>',
                        '<hr class="border-outline-variant/20 my-6"/>',
                        '<div class="flex justify-between text-body-lg font-body-lg text-primary font-medium"><span>Total</span><span id="total-display">₹' + formatINR(grandTotal) + '</span></div>',
                    '</div>',
                '</div>',
            '</div>'
        ].join('');
    }

    function swapGalleryImages() {
        var imgs = document.querySelectorAll('.gallery-img');
        imgs.forEach(function(el) {
            var rid = parseInt(el.getAttribute('data-room-id'));
            var idx = parseInt(el.getAttribute('data-index'));
            var r = getRoomById(rid);
            if (r) {
                var imgsArr = getRoomImages(r);
                if (imgsArr[idx]) {
                    el.style.backgroundImage = 'url(' + imgsArr[idx] + ')';
                }
            }
        });
    }

    renderRoom(room);

    var themeObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
            if (m.type === 'attributes' && m.attributeName === 'class') {
                swapGalleryImages();
            }
        });
    });
    themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
})();
</script>
