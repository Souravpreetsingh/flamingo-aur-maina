<!DOCTYPE html>
<html class="" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script>try{var t=localStorage.getItem('lx-theme');if(t==='winter')document.documentElement.classList.add('winter');}catch(e){}</script>


<title>Reset Password - Flamingo aur Maina | FAM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="../../js/tailwind-config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/toast.js"></script>
<link href="../../css/shared.css" rel="stylesheet"/>
<style>
.glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 32px 0 rgba(13, 28, 47, 0.08); }
.winter .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.3); }
.input-group:focus-within label, .input-group input:not(:placeholder-shown) + label { transform: translateY(-24px) scale(0.85); color: #735c00; }
.winter .input-group:focus-within label, .winter .input-group input:not(:placeholder-shown) + label { color: var(--secondary); }
.ripple-btn { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.ripple-btn:active { transform: scale(0.97); }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
</style>
<script src="../../js/theme.js"></script>
<script src="../../js/shared.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center px-margin-mobile selection:bg-secondary-container">
<div class="w-full max-w-md">
<div class="flex items-center justify-center gap-4 mb-8">
<a href="../../index.html" class="text-headline-md font-headline-md font-bold tracking-tight text-primary hover:opacity-80 transition-opacity">FAM</a>

</div>
<div class="glass-card rounded-[2rem] p-8 md:p-10 backdrop-blur-3xl">
<div class="text-center mb-8">
<span class="material-symbols-outlined text-[48px] text-secondary mb-4 inline-block">key</span>
<h1 class="text-headline-md font-headline-md text-on-surface mb-2">Reset Password</h1>
<p class="text-body-md text-on-surface-variant">Enter your new password below.</p>
</div>
<form class="space-y-6" id="resetForm" novalidate>
<input id="token" type="hidden"/>
<div class="relative input-group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">lock</span></div>
<input class="block w-full pl-10 pr-3 py-4 border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-secondary transition-colors duration-300 font-body-md text-on-surface peer" id="password" placeholder=" " required type="password"/>
<label class="absolute left-10 top-4 text-on-surface-variant font-body-md pointer-events-none transition-[color,transform] duration-300 origin-left" for="password">New Password</label>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-[width] duration-500 peer-focus:w-full"></div>
</div>
<div class="relative input-group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">lock</span></div>
<input class="block w-full pl-10 pr-3 py-4 border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-secondary transition-colors duration-300 font-body-md text-on-surface peer" id="confirmPassword" placeholder=" " required type="password"/>
<label class="absolute left-10 top-4 text-on-surface-variant font-body-md pointer-events-none transition-[color,transform] duration-300 origin-left" for="confirmPassword">Confirm New Password</label>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-[width] duration-500 peer-focus:w-full"></div>
</div>
<button class="ripple-btn w-full py-4 bg-primary text-on-primary rounded-full font-label-md hover:bg-on-primary-fixed transition-[background-color,color,box-shadow] duration-300 shadow-lg hover:shadow-xl" id="resetBtn" type="submit">Reset Password</button>
</form>
<div class="mt-6 text-center">
<p class="text-body-md text-on-surface-variant"><a class="text-secondary font-semibold hover:underline transition-colors" href="../login/index.html">Back to Sign In</a></p>
</div>
</div>
</div>
<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
if (token) document.getElementById('token').value = token;

document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearFieldErrors('resetForm');
    const token = document.getElementById('token').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!token) { showToast('Invalid or missing reset token.', 'error'); return; }
    let valid = true;
    if (!password || password.length < 6) { showFieldError('password', 'Password must be at least 6 characters'); valid = false; }
    if (password !== confirmPassword) { showFieldError('confirmPassword', 'Passwords do not match'); valid = false; }
    if (!valid) return;

    setLoading('resetBtn', true, 'Resetting...');
    try {
        await AuthAPI.resetPassword(token, password, confirmPassword);
        showToast('Password reset successfully! Redirecting to sign in...', 'success');
        setTimeout(() => { window.location.href = '../login/index.html'; }, 1500);
    } catch (err) {
        showToast(err.detail || 'Failed to reset password. Try again.', 'error');
        setLoading('resetBtn', false);
    }
});
</script>
<!-- Floating Theme Toggle Button -->
<button onclick="__toggleTheme()" class="theme-toggle fixed top-24 right-6 z-50 flex items-center px-3.5 py-2 rounded-full bg-white/60 backdrop-blur-xl border border-outline-variant/30 shadow-lg hover:bg-white/80 hover:scale-105 transition-[background-color,color,opacity,transform,box-shadow] duration-500" aria-label="Toggle theme">
    <span class="theme-toggle-text text-label-md font-label-md text-primary font-bold">?? Winter</span>
</button>
</body>
</html>
