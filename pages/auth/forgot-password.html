<!DOCTYPE html>
<html class="" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script>try{var t=localStorage.getItem('lx-theme');if(t==='winter')document.documentElement.classList.add('winter');}catch(e){}</script>


<title>Forgot Password - Flamingo aur Maina | FAM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="../../js/tailwind-config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/toast.js"></script>
<link href="../../css/shared.css" rel="stylesheet"/>
<style>
.glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 32px 0 rgba(13, 28, 47, 0.08); }
.winter .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.3); }
.input-group:focus-within label, .input-group input:not(:placeholder-shown) + label { transform: translateY(-24px) scale(0.85); color: #735c00; }
.winter .input-group:focus-within label, .winter .input-group input:not(:placeholder-shown) + label { color: var(--secondary); }
.ripple-btn { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
.ripple-btn:active { transform: scale(0.97); }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
</style>
<script src="../../js/theme.js"></script>
<script src="../../js/shared.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center px-margin-mobile selection:bg-secondary-container">
<div class="w-full max-w-md">
<div class="flex items-center justify-center gap-4 mb-8">
<a href="../../index.html" class="text-headline-md font-headline-md font-bold tracking-tight text-primary hover:opacity-80 transition-opacity">FAM</a>

</div>
<div class="glass-card rounded-[2rem] p-8 md:p-10 backdrop-blur-3xl">
<div class="text-center mb-8">
<span class="material-symbols-outlined text-[48px] text-secondary mb-4 inline-block">lock_reset</span>
<h1 class="text-headline-md font-headline-md text-on-surface mb-2">Forgot Password?</h1>
<p class="text-body-md text-on-surface-variant">Enter your email and we'll send you a reset link.</p>
</div>
<form class="space-y-6" id="forgotForm" novalidate>
<div class="relative input-group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">mail</span></div>
<input class="block w-full pl-10 pr-3 py-4 border-0 border-b border-outline-variant bg-transparent focus:ring-0 focus:border-secondary transition-colors duration-300 font-body-md text-on-surface peer" id="email" placeholder=" " required type="email"/>
<label class="absolute left-10 top-4 text-on-surface-variant font-body-md pointer-events-none transition-[color,transform] duration-300 origin-left" for="email">Email Address</label>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-secondary transition-[width] duration-500 peer-focus:w-full"></div>
</div>
<button class="ripple-btn w-full py-4 bg-primary text-on-primary rounded-full font-label-md hover:bg-on-primary-fixed transition-[background-color,color,box-shadow] duration-300 shadow-lg hover:shadow-xl" id="forgotBtn" type="submit">Send Reset Link</button>
</form>
<div class="mt-6 text-center space-y-2">
<p class="text-body-md text-on-surface-variant"><a class="text-secondary font-semibold hover:underline transition-colors" href="../login/index.html">Back to Sign In</a></p>
</div>
</div>
</div>
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearFieldErrors('forgotForm');
    const email = document.getElementById('email').value.trim();
    if (!email) { showFieldError('email', 'Email is required'); return; }
    if (!isValidEmail(email)) { showFieldError('email', 'Enter a valid email address'); return; }
    setLoading('forgotBtn', true, 'Sending...');
    try {
        const data = await AuthAPI.forgotPassword(email);
        showToast(data.message || 'If an account exists, a reset link has been sent.', 'success');
        document.getElementById('forgotForm').reset();
        setLoading('forgotBtn', false);
    } catch (err) {
        showToast(err.detail || 'Something went wrong. Try again.', 'error');
        setLoading('forgotBtn', false);
    }
});
</script>
<!-- Floating Theme Toggle Button -->
<button onclick="__toggleTheme()" class="theme-toggle fixed top-24 right-6 z-50 flex items-center px-3.5 py-2 rounded-full bg-white/60 backdrop-blur-xl border border-outline-variant/30 shadow-lg hover:bg-white/80 hover:scale-105 transition-[background-color,color,opacity,transform,box-shadow] duration-500" aria-label="Toggle theme">
    <span class="theme-toggle-text text-label-md font-label-md text-primary font-bold">?? Winter</span>
</button>
</body>
</html>
